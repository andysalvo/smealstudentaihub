<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI in Corporate Innovation and Entrepreneurship</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{--hub-navy:#01458F;--hub-navy-light:rgba(1,69,143,.08);--hub-navy-faint:rgba(1,69,143,.04);--hub-hover:#0C5BBF;--hub-bg:#F7F9FC;--hub-surface:#FFFFFF;--hub-border:#E3E8F0;--hub-text:#0B1F3B;--hub-text-sec:#4B5D73;--hub-radius:12px;--hub-speed:180ms ease}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{background:var(--hub-bg);color:var(--hub-text);font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
    .hub-shell{max-width:1360px;margin:0 auto;padding:16px}
    .hub-module{display:grid;grid-template-columns:300px 1fr;border:1px solid var(--hub-border);border-radius:16px;background:var(--hub-surface);box-shadow:0 2px 16px rgba(11,31,59,.05);overflow:hidden}
    .hub-nav{background:var(--hub-bg);border-right:1px solid var(--hub-border);padding:20px 14px}
    .hub-nav-label{font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--hub-text-sec);padding:0 10px 14px}
    .hub-sec-btn{width:100%;border:none;border-radius:10px;background:transparent;color:var(--hub-text);text-align:left;padding:11px 12px;font:600 13.5px/1.4 "Inter",sans-serif;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background var(--hub-speed),color var(--hub-speed)}
    .hub-sec-btn:hover{background:var(--hub-navy-light)}
    .hub-sec-btn[aria-expanded="true"]{background:var(--hub-navy);color:#fff}
    .hub-sec-btn:focus-visible,.hub-con-btn:focus-visible{outline:2px solid var(--hub-hover);outline-offset:2px}
    .hub-caret{width:14px;height:14px;flex-shrink:0;transition:transform var(--hub-speed)}
    .hub-sec-btn[aria-expanded="true"] .hub-caret{transform:rotate(90deg)}
    .hub-concepts{margin:4px 0 6px 16px;padding-left:12px;border-left:2px solid var(--hub-border);display:flex;flex-direction:column;gap:1px}
    .hub-con-btn{border:none;border-radius:8px;background:transparent;color:var(--hub-text-sec);text-align:left;padding:9px 10px;font:500 12.5px/1.45 "Inter",sans-serif;cursor:pointer;transition:background var(--hub-speed),color var(--hub-speed)}
    .hub-con-btn:hover{background:var(--hub-navy-faint);color:var(--hub-text)}
    .hub-con-btn[aria-pressed="true"]{background:var(--hub-navy-light);color:var(--hub-navy);font-weight:600}
    .hub-reading{padding:28px 32px 32px}
    .hub-kicker{font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--hub-navy);margin-bottom:6px}
    .hub-title{font-size:clamp(22px,2.4vw,32px);font-weight:700;line-height:1.18;letter-spacing:-.015em;color:var(--hub-text)}
    .hub-bar{width:40px;height:3px;background:var(--hub-navy);border-radius:2px;margin:12px 0 24px}
    .hub-img-wrap{width:100%;max-width:560px;border-radius:var(--hub-radius);overflow:hidden;border:1px solid var(--hub-border);margin-bottom:24px}
    .hub-img-wrap img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}
    .hub-img-wrap figcaption{padding:8px 14px;font-size:11.5px;line-height:1.5;color:var(--hub-text-sec);background:var(--hub-bg);border-top:1px solid var(--hub-border)}
    .hub-body{display:flex;flex-direction:column;gap:14px;margin-bottom:28px}
    .hub-body p{font-size:15px;line-height:1.68;color:var(--hub-text-sec)}
    .hub-points{border:1px solid var(--hub-border);border-radius:var(--hub-radius);background:var(--hub-bg);padding:16px 20px}
    .hub-points-label{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--hub-text-sec);margin-bottom:12px}
    .hub-points-list{list-style:none;display:flex;flex-direction:column;gap:10px}
    .hub-points-list li{display:flex;align-items:baseline;gap:10px;font-size:13.5px;line-height:1.5;color:var(--hub-text)}
    .hub-num{width:22px;height:22px;border-radius:50%;background:var(--hub-navy-light);color:var(--hub-navy);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .hub-sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
    @media(max-width:960px){.hub-module{grid-template-columns:260px 1fr}.hub-reading{padding:24px}}
    @media(max-width:768px){.hub-shell{padding:10px}.hub-module{grid-template-columns:1fr}.hub-nav{border-right:none;border-bottom:1px solid var(--hub-border);padding:16px 12px}.hub-reading{padding:20px 16px 24px}.hub-title{font-size:22px}.hub-img-wrap{max-width:100%}}
    @media(max-width:480px){.hub-shell{padding:6px}.hub-module{border-radius:10px}.hub-reading{padding:16px 14px 20px}.hub-body p{font-size:14px}.hub-points-list li{font-size:13px}}
  </style>
</head>
<body>
  <main class="hub-shell">
    <h1 class="hub-sr">AI in Corporate Innovation and Entrepreneurship</h1>
    <div class="hub-module">
      <nav class="hub-nav" aria-label="Sections">
        <p class="hub-nav-label">AI in Corporate Innovation</p>
        <div id="nav"></div>
      </nav>
      <article class="hub-reading" aria-live="polite" id="reading"></article>
    </div>
  </main>

  <script>
    const IMAGES={"where-ai-appears":"https://raw.githubusercontent.com/andysalvo/applied-ai-club/main/modules/images/cie-section1-where-ai-appears.jpg","what-ai-helps-with":"https://raw.githubusercontent.com/andysalvo/applied-ai-club/main/modules/images/cie-section2-what-ai-helps-with.jpg","where-ai-falls-short":"https://raw.githubusercontent.com/andysalvo/applied-ai-club/main/modules/images/cie-section3-where-ai-falls-short.jpg","what-to-keep-in-mind":"https://raw.githubusercontent.com/andysalvo/applied-ai-club/main/modules/images/cie-section4-what-to-keep-in-mind.jpg"};
    const CAPTIONS={"where-ai-appears":"AI appears in innovation where teams scan markets, test hypotheses, and prioritize competing bets.","what-ai-helps-with":"AI is expected to organize ambiguous signals, accelerate learning loops, and coordinate multi-team pipelines.","where-ai-falls-short":"AI cannot reliably pick winners alone, and pilot success does not guarantee enterprise scale.","what-to-keep-in-mind":"Accountability, capability building, balanced metrics, and responsible innovation define readiness."};

    const DATA={sections:[
      {id:"where-ai-appears",title:"Where AI Appears",concepts:[
        {id:"opportunity-sensing",title:"Opportunity Sensing and Market Discovery",paragraphs:["In corporate innovation and entrepreneurship, AI appears early in market sensing work. Teams use it to scan customer feedback, analyst notes, patent activity, and competitor moves so they can identify unmet needs before launching major initiatives.","This matters because the volume of weak signals is too large for manual review. Recent global benchmarking summarized in the 2025 AI Index reports broad enterprise AI use across business functions, which helps explain why market-discovery workflows now rely on machine-assisted filtering.","For undergraduates, this topic connects strategy concepts to practical evidence collection. Instead of starting from one obvious idea, students learn how opportunity framing improves when many fragmented signals are organized into comparable themes.","For professors and advanced learners, the key takeaway is methodological: AI improves signal coverage and pattern visibility, but opportunity quality still depends on strategic interpretation, industry context, and the assumptions guiding where teams choose to look."],keyPoints:["AI is commonly used to organize high-volume market and customer signals.","Better signal coverage improves early opportunity framing under uncertainty.","Strategic interpretation remains the deciding factor in what is pursued."]},
        {id:"experimentation",title:"Experimentation and Hypothesis Testing",paragraphs:["AI also appears when firms test innovation hypotheses before full commitment. Teams use it to compare alternative concepts, draft value propositions, and prioritize which assumptions should be tested first through pilots or small market probes.","In this stage, AI is less about prediction and more about disciplined learning. It can rapidly surface competing explanations from interview notes, web behavior, and campaign data so teams can identify what evidence is still missing.","For undergraduates, this reinforces that entrepreneurship is an evidence-building process. Good innovation decisions come from repeated hypothesis cycles, not from one-time idea generation or intuition alone.","For professors, AI-supported experimentation is a useful way to teach rigor: define assumptions, set measurable tests, interpret contradictory results, and update the thesis based on what survives contact with real customer behavior."],keyPoints:["AI helps structure and sequence hypothesis tests before scale-up.","The goal is faster learning, not automatic certainty.","Strong experimentation still requires explicit assumptions and test design."]},
        {id:"portfolio-prioritization",title:"Portfolio Prioritization and Resource Allocation",paragraphs:["In established companies, AI appears in portfolio management conversations because many innovation bets compete for limited talent, capital, and leadership attention. Teams need a repeatable way to compare initiatives at different maturity levels.","OECD indicators from 2025 show uneven AI adoption by firm size, with much higher uptake among large firms than small firms. That gap highlights why portfolio systems matter: organizations with more initiatives need stronger prioritization methods to avoid fragmented execution.","AI can support this by clustering similar opportunities, flagging stalled projects, and showing where risk-return assumptions diverge from current evidence. These outputs help decision meetings focus on tradeoffs instead of anecdote.","For students and faculty, the important distinction is that AI can improve the quality of comparison, but executives still decide strategic fit, acceptable risk, and how much uncertainty the organization is willing to carry at each stage."],keyPoints:["AI supports side-by-side comparison of competing innovation bets.","Portfolio discipline is especially important at larger organizational scale.","Final allocation decisions remain leadership and governance choices."]},
        {id:"venture-building",title:"Intrapreneurship and Venture Building",paragraphs:["AI appears in corporate venture building when teams shape early business models, define target segments, and estimate adoption paths for new internal ventures. It is often used to reduce early ambiguity in pricing, positioning, and go-to-market planning.","Inside incubators and innovation studios, AI can summarize discovery interviews, compare similar startup trajectories, and highlight operational assumptions that require validation. This shortens cycle time between idea framing and evidence-based revision.","For undergraduates, this demonstrates that intrapreneurship is not just creativity. It combines structured search, staged commitments, and ongoing recalibration as new data changes the probability of venture success.","For professors, AI in venture-building contexts offers a practical bridge between entrepreneurship theory and organizational reality: novel concepts must survive governance, resource constraints, and cross-functional execution, not just concept-level excitement."],keyPoints:["AI supports early venture design and assumption clarification.","Useful outputs include segmentation clues, pricing hypotheses, and risk flags.","Execution quality and organizational support still determine venture outcomes."]}
      ]},
      {id:"what-ai-helps-with",title:"What AI Helps With",concepts:[
        {id:"ambiguous-signals",title:"Handle Ambiguous Signals in Messy Data",paragraphs:["Innovation teams often work with messy, partial, and contradictory information. AI is expected to help by organizing unstructured inputs such as open-ended feedback, support logs, competitor messages, and trend commentary into patterns that are easier to evaluate.","This does not mean AI converts ambiguity into certainty. It means teams can process more context quickly and separate recurring themes from random noise before framing strategy conversations.","For undergraduates, this is a practical lesson in analytical hygiene: the first step in innovation is often problem structuring, not immediate solution design. Better structure increases the quality of strategic options.","For professors and advanced classes, AI-assisted signal handling can be used to teach evidence quality standards, showing how classification choices, missing data, and category definitions shape downstream decisions."],keyPoints:["AI is expected to organize messy qualitative and quantitative inputs.","Pattern visibility improves when signals are standardized for review.","Ambiguity remains and must be interpreted with context-aware judgment."]},
        {id:"learning-loops",title:"Accelerate Learning Loops",paragraphs:["A core expectation is that AI helps teams learn faster from each experiment cycle. Instead of waiting for long post-mortems, teams can update hypotheses as evidence arrives and redirect effort toward stronger opportunities.","This acceleration can improve innovation throughput when teams track assumptions explicitly and decide in advance what evidence will trigger continuation, redesign, or shutdown. AI helps maintain that discipline at higher speed.","For undergraduates, faster learning loops illustrate why entrepreneurship is iterative. Valuable progress often comes from reducing uncertainty in stages rather than trying to perfect a concept in one pass.","For professors, AI-enabled iteration is useful for teaching decision timing: high-performing teams move quickly, but they still protect validity by defining metrics, test windows, and review criteria before execution begins."],keyPoints:["AI can shorten the time between experiment and decision.","Speed is valuable only when test criteria remain explicit and auditable.","Iteration quality depends on disciplined stop, continue, and pivot rules."]},
        {id:"multi-team-pipelines",title:"Coordinate Multi-Team Innovation Pipelines",paragraphs:["As innovation programs grow, teams across product, finance, operations, and legal often evaluate related initiatives at the same time. AI is expected to help coordinate this pipeline by standardizing status updates and surfacing dependency risks earlier.","In practice, this means summarizing project evidence, highlighting blockers, and improving visibility into which initiatives are converging toward readiness versus those accumulating unresolved assumptions.","For undergraduates, this expands the definition of innovation work beyond idea generation. High-quality innovation also requires workflow clarity, ownership, and a shared language for project health.","For professors, multi-team coordination is a strong teaching context for governance design: when organizations scale experimentation, consistent review structures are needed so portfolio decisions are comparable and defensible."],keyPoints:["AI helps standardize innovation status signals across teams.","Earlier visibility into blockers supports better sequencing of work.","Governance structure is required for reliable portfolio coordination."]},
        {id:"scenario-foresight",title:"Scenario Planning and Strategic Foresight",paragraphs:["AI is increasingly expected to support scenario planning by helping teams model how demand, competitor response, input costs, or policy shifts might affect innovation outcomes. This is especially relevant when long development cycles create exposure to changing external conditions.","Rather than selecting one forecast, teams can compare several plausible futures and test whether a strategy is robust under different assumptions. AI helps generate and evaluate these scenario sets at greater scale.","For undergraduates, this reinforces probabilistic thinking: strategic quality depends on preparation for multiple outcomes, not confidence in one narrative. Scenario work turns uncertainty into actionable contingency planning.","For professors, AI-assisted foresight can anchor discussion about resilience and option value. Strong strategies preserve flexibility and learning capacity when assumptions change faster than initial business plans predicted."],keyPoints:["AI supports faster construction and comparison of plausible future scenarios.","Scenario robustness is often more useful than single-point prediction.","Foresight quality depends on transparent assumptions and revision cycles."]}
      ]},
      {id:"where-ai-falls-short",title:"Where AI Falls Short",concepts:[
        {id:"cant-pick-winners",title:"AI Cannot Reliably Pick Winners Alone",paragraphs:["A common misunderstanding is that AI can identify winning innovations with high confidence before market validation. In reality, outcomes depend on timing, channel dynamics, regulation, execution quality, and customer behavior that may not be visible in historical data.","AI can rank patterns and correlations, but breakthrough ideas often succeed for reasons that are context-specific or initially weak in the data. This is one reason false negatives and false positives remain common in early-stage screening.","For undergraduates, this is an important caution against deterministic thinking. Decision tools can improve prioritization, yet entrepreneurial outcomes still require strategic judgment under uncertainty.","For professors, the teaching implication is clear: evaluation frameworks should combine model outputs with theory-informed reasoning, competitive analysis, and clear articulation of what evidence is still unknown."],keyPoints:["Model ranking is useful, but it is not a guaranteed winner-selection mechanism.","Innovation outcomes depend on execution and context not fully captured in data.","Human judgment remains essential when evidence is incomplete or shifting."]},
        {id:"more-data-limits",title:"More Data Does Not Automatically Improve Decisions",paragraphs:["Another misconception is that adding more data always improves innovation quality. Large datasets can still be biased, stale, or unrepresentative, especially when they over-sample incumbent users and under-sample emerging behaviors.","AI can magnify those distortions if teams do not examine data provenance and measurement assumptions. In that case, decision confidence increases while actual decision quality may not.","For undergraduates, this is a practical reminder that data literacy includes source critique, not just dashboard reading. Better inputs require asking who is represented, who is missing, and which variables proxy rather than measure real customer value.","For professors, this section supports deeper methodological discussion around construct validity, selection bias, and when qualitative fieldwork is necessary to challenge model-driven narratives."],keyPoints:["Data volume cannot compensate for biased or low-quality input sources.","Unchecked datasets can create overconfidence and strategic blind spots.","Robust decisions require source validation and mixed-method evidence."]},
        {id:"pilot-vs-scale",title:"Pilot Success Does Not Guarantee Scale",paragraphs:["Innovation teams often assume that a successful pilot will scale smoothly. In practice, many initiatives stall between proof of concept and production because operating models, incentives, and technical integration were not designed for enterprise adoption.","Recent enterprise tracking by Deloitte shows that many organizations expect only a minority of experiments to reach production scale in the near term. This gap reflects organizational friction more than algorithm quality alone.","For undergraduates, this clarifies why innovation management includes implementation architecture. A pilot demonstrates possibility; scale requires process redesign, governance alignment, and sustained ownership.","For professors, this concept is a strong bridge to change-management theory: scaling innovation is a socio-technical transition that depends on leadership commitment, capability transfer, and accountability structures."],keyPoints:["Pilot validation and enterprise-scale adoption are different challenges.","Scaling failures often come from organizational design gaps, not just models.","Sustained ownership and process integration are required for rollout success."]},
        {id:"governance-model-risk",title:"Governance, Assumptions, and Model Risk",paragraphs:["AI outputs in innovation contexts can look precise even when underlying assumptions are fragile. Without governance, teams may act on scores or rankings that are sensitive to hidden parameter choices, incomplete data, or drift in market behavior.","The NIST AI Risk Management Framework emphasizes recurring governance activity through four connected actions: govern, map, measure, and manage. That framing is useful because innovation programs need ongoing controls, not one-time approval.","For undergraduates, the practical message is that trustworthy analytics includes documentation of assumptions, thresholds, and override conditions. Governance is what makes a decision process inspectable and improvable over time.","For professors, this area opens discussion on model risk policy, auditability, and the institutional design required to use AI responsibly in high-uncertainty strategic environments."],keyPoints:["Reliable innovation analytics requires explicit governance and model-risk controls.","Assumptions must be documented and periodically retested under drift.","Trustworthy use depends on reviewability, not just predictive output."]}
      ]},
      {id:"what-to-keep-in-mind",title:"What to Keep in Mind",concepts:[
        {id:"decision-rights",title:"Decision Rights and Accountability",paragraphs:["In corporate innovation, AI should improve decision quality, but it should not blur ownership. Teams need clear decision rights for problem framing, data selection, model interpretation, and final approval of strategic moves.","When accountability is vague, organizations may over-trust automated outputs or under-react to warning signs. Clear ownership improves escalation, documentation, and post-decision learning when results differ from expectations.","For undergraduates, this is a direct leadership lesson: useful analysis still requires someone to be responsible for the call. Accountability is part of strategy execution, not a separate administrative step.","For professors, this concept supports classroom work on governance architecture by asking who can approve, who can override, and what evidence must exist before resources are reallocated across innovation bets."],keyPoints:["Decision support is strongest when ownership boundaries are explicit.","Accountability enables better escalation and post-decision learning.","AI should inform choices without obscuring who is responsible for outcomes."]},
        {id:"capability-building",title:"Capability Building and Change Management",paragraphs:["A second consideration is organizational capability. AI-supported innovation requires people who can combine domain knowledge, statistical reasoning, product judgment, and operational understanding in one decision process.","OECD reporting consistently highlights complementary assets such as skills, workflow redesign, and management practice as key adoption constraints. This is why capability gaps often limit value even when tools are technically available.","For undergraduates, this means career preparation should include communication and problem-framing skills in addition to technical fluency. Innovation roles increasingly reward people who can translate across business and analytics teams.","For professors, the implication is curricular: projects should train students to define assumptions, collaborate across functions, and communicate uncertainty clearly to non-technical decision makers."],keyPoints:["AI value depends on cross-functional capability, not technology access alone.","Skill development and workflow redesign are central adoption requirements.","Education should emphasize translation between analytics and strategic action."]},
        {id:"metrics-balance",title:"Metrics That Balance Speed and Value",paragraphs:["Innovation teams need metrics that reward both learning velocity and economic value. If measurement focuses only on speed, organizations can scale low-value ideas; if measurement focuses only on late financial outcomes, promising options may be abandoned too early.","Balanced scorecards should combine leading indicators such as experiment cycle time, assumption closure rate, and validated demand signals with lagging indicators like margin impact, retention, or portfolio return.","For undergraduates, this demonstrates that metrics shape behavior. The wrong metric architecture can produce activity without progress, while disciplined metrics help teams distinguish movement from meaningful evidence.","For professors, this concept supports robust evaluation design: measure not only wins, but also efficient shutdowns and resource redeployment quality, because strong innovation systems learn by stopping weak bets early."],keyPoints:["Effective metrics track both learning speed and long-term value creation.","Leading and lagging indicators should be used together for decisions.","Portfolio quality improves when shutdown and redeployment are measured."]},
        {id:"responsible-innovation",title:"Responsible Innovation, IP, and Trust",paragraphs:["Responsible use of AI is a strategic requirement in corporate innovation, not a legal afterthought. Teams must manage data rights, explainability expectations, bias controls, and customer trust while moving quickly in competitive markets.","WIPO trend analysis shows fast growth in generative AI patenting over the last decade, which signals both opportunity and a denser intellectual-property landscape. Innovation teams therefore need stronger IP awareness when creating or adapting AI-enabled offerings.","For undergraduates, this topic highlights that innovation quality includes social legitimacy. A technically strong concept can still fail if stakeholders do not trust how data is used or how decisions affect different groups.","For professors, this section is a strong foundation for governance and ethics modules: sustainable advantage comes from combining experimentation speed with defensible controls, transparent communication, and clear responsibility for downstream impacts."],keyPoints:["Responsible AI practices are core to scalable innovation strategy.","Rapid patent growth increases the importance of IP-aware design choices.","Trust, transparency, and fairness directly affect adoption and durability."]}
      ]}
    ]};

    let curSec=DATA.sections[0].id,curCon=DATA.sections[0].concepts[0].id;
    const $nav=document.getElementById("nav"),$reading=document.getElementById("reading");
    function sec(id){return DATA.sections.find(s=>s.id===id)}
    function con(s,id){return s.concepts.find(c=>c.id===id)}
    function pick(secId){if(curSec===secId)return;curSec=secId;curCon=sec(secId).concepts[0].id;render()}
    function pickCon(sId,cId){curSec=sId;curCon=cId;render()}
    function renderNav(){let h="";DATA.sections.forEach(s=>{const open=s.id===curSec;h+='<button type="button" class="hub-sec-btn" aria-expanded="'+open+'" onclick="pick(\''+s.id+'\')"><svg class="hub-caret" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M6 3l5 5-5 5z"/></svg><span>'+s.title+'</span></button>';if(open){h+='<div class="hub-concepts">';s.concepts.forEach(c=>{h+='<button type="button" class="hub-con-btn" aria-pressed="'+(c.id===curCon)+'" onclick="pickCon(\''+s.id+"','"+c.id+'\')">'+c.title+'</button>'});h+='</div>'}});$nav.innerHTML=h}
    function renderReading(){const s=sec(curSec),c=con(s,curCon),img=IMAGES[s.id],cap=CAPTIONS[s.id];let h='<p class="hub-kicker">'+s.title+'</p><h2 class="hub-title">'+c.title+'</h2><div class="hub-bar" aria-hidden="true"></div><div class="hub-body">';c.paragraphs.forEach(p=>{h+='<p>'+p+'</p>'});h+='</div>';if(img){h+='<figure class="hub-img-wrap"><img src="'+img+'" alt="'+s.title+'" loading="lazy" onerror="this.parentElement.style.display=\'none\'"/><figcaption>'+cap+'</figcaption></figure>'}h+='<div class="hub-points"><p class="hub-points-label">Key Points</p><ul class="hub-points-list">';c.keyPoints.forEach((pt,i)=>{h+='<li><span class="hub-num" aria-hidden="true">'+(i+1)+'</span><span>'+pt+'</span></li>'});h+='</ul></div>';$reading.innerHTML=h}
    function render(){renderNav();renderReading()}
    render();
  </script>
</body>
</html>
