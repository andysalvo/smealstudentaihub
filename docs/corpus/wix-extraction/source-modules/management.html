<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI in Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --hub-navy: #01458f;
        --hub-navy-light: rgba(1, 69, 143, 0.08);
        --hub-navy-faint: rgba(1, 69, 143, 0.04);
        --hub-hover: #0c5bbf;
        --hub-bg: #f7f9fc;
        --hub-surface: #ffffff;
        --hub-border: #e3e8f0;
        --hub-text: #0b1f3b;
        --hub-text-sec: #4b5d73;
        --hub-radius: 12px;
        --hub-speed: 180ms ease;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        background: var(--hub-bg);
        color: var(--hub-text);
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif;
        font-size: 16px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }
      .hub-shell {
        max-width: 1360px;
        margin: 0 auto;
        padding: 16px;
      }
      .hub-module {
        display: grid;
        grid-template-columns: 300px 1fr;
        border: 1px solid var(--hub-border);
        border-radius: 16px;
        background: var(--hub-surface);
        box-shadow: 0 2px 16px rgba(11, 31, 59, 0.05);
        overflow: hidden;
      }
      .hub-nav {
        background: var(--hub-bg);
        border-right: 1px solid var(--hub-border);
        padding: 20px 14px;
      }
      .hub-nav-label {
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--hub-text-sec);
        padding: 0 10px 14px;
      }
      .hub-sec-btn {
        width: 100%;
        border: none;
        border-radius: 10px;
        background: transparent;
        color: var(--hub-text);
        text-align: left;
        padding: 11px 12px;
        font:
          600 13.5px/1.4 'Inter',
          sans-serif;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        transition:
          background var(--hub-speed),
          color var(--hub-speed);
      }
      .hub-sec-btn:hover {
        background: var(--hub-navy-light);
      }
      .hub-sec-btn[aria-expanded='true'] {
        background: var(--hub-navy);
        color: #fff;
      }
      .hub-sec-btn:focus-visible,
      .hub-con-btn:focus-visible {
        outline: 2px solid var(--hub-hover);
        outline-offset: 2px;
      }
      .hub-caret {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
        transition: transform var(--hub-speed);
      }
      .hub-sec-btn[aria-expanded='true'] .hub-caret {
        transform: rotate(90deg);
      }
      .hub-concepts {
        margin: 4px 0 6px 16px;
        padding-left: 12px;
        border-left: 2px solid var(--hub-border);
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .hub-con-btn {
        border: none;
        border-radius: 8px;
        background: transparent;
        color: var(--hub-text-sec);
        text-align: left;
        padding: 9px 10px;
        font:
          500 12.5px/1.45 'Inter',
          sans-serif;
        cursor: pointer;
        transition:
          background var(--hub-speed),
          color var(--hub-speed);
      }
      .hub-con-btn:hover {
        background: var(--hub-navy-faint);
        color: var(--hub-text);
      }
      .hub-con-btn[aria-pressed='true'] {
        background: var(--hub-navy-light);
        color: var(--hub-navy);
        font-weight: 600;
      }
      .hub-reading {
        padding: 28px 32px 32px;
      }
      .hub-kicker {
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--hub-navy);
        margin-bottom: 6px;
      }
      .hub-title {
        font-size: clamp(22px, 2.4vw, 32px);
        font-weight: 700;
        line-height: 1.18;
        letter-spacing: -0.015em;
        color: var(--hub-text);
      }
      .hub-bar {
        width: 40px;
        height: 3px;
        background: var(--hub-navy);
        border-radius: 2px;
        margin: 12px 0 24px;
      }
      .hub-img-wrap {
        width: 100%;
        max-width: 560px;
        border-radius: var(--hub-radius);
        overflow: hidden;
        border: 1px solid var(--hub-border);
        margin-bottom: 24px;
      }
      .hub-img-wrap img {
        width: 100%;
        aspect-ratio: 16/9;
        object-fit: cover;
        display: block;
      }
      .hub-img-wrap figcaption {
        padding: 8px 14px;
        font-size: 11.5px;
        line-height: 1.5;
        color: var(--hub-text-sec);
        background: var(--hub-bg);
        border-top: 1px solid var(--hub-border);
      }
      .hub-body {
        display: flex;
        flex-direction: column;
        gap: 14px;
        margin-bottom: 28px;
      }
      .hub-body p {
        font-size: 15px;
        line-height: 1.68;
        color: var(--hub-text-sec);
      }
      .hub-points {
        border: 1px solid var(--hub-border);
        border-radius: var(--hub-radius);
        background: var(--hub-bg);
        padding: 16px 20px;
      }
      .hub-points-label {
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--hub-text-sec);
        margin-bottom: 12px;
      }
      .hub-points-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .hub-points-list li {
        display: flex;
        align-items: baseline;
        gap: 10px;
        font-size: 13.5px;
        line-height: 1.5;
        color: var(--hub-text);
      }
      .hub-num {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--hub-navy-light);
        color: var(--hub-navy);
        font-size: 11px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .hub-sr {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
      }
      @media (max-width: 960px) {
        .hub-module {
          grid-template-columns: 260px 1fr;
        }
        .hub-reading {
          padding: 24px;
        }
      }
      @media (max-width: 768px) {
        .hub-shell {
          padding: 10px;
        }
        .hub-module {
          grid-template-columns: 1fr;
        }
        .hub-nav {
          border-right: none;
          border-bottom: 1px solid var(--hub-border);
          padding: 16px 12px;
        }
        .hub-reading {
          padding: 20px 16px 24px;
        }
        .hub-title {
          font-size: 22px;
        }
        .hub-img-wrap {
          max-width: 100%;
        }
      }
      @media (max-width: 480px) {
        .hub-shell {
          padding: 6px;
        }
        .hub-module {
          border-radius: 10px;
        }
        .hub-reading {
          padding: 16px 14px 20px;
        }
        .hub-body p {
          font-size: 14px;
        }
        .hub-points-list li {
          font-size: 13px;
        }
      }
    </style>
  </head>
  <body>
    <main class="hub-shell">
      <h1 class="hub-sr">AI in Management</h1>
      <div class="hub-module">
        <nav class="hub-nav" aria-label="Sections">
          <p class="hub-nav-label">AI in Management</p>
          <div id="nav"></div>
        </nav>
        <article class="hub-reading" aria-live="polite" id="reading"></article>
      </div>
    </main>

    <script>
      const IMAGES = {
        'where-ai-appears':
          'https://raw.githubusercontent.com/andysalvo/applied-ai-club/main/modules/images/mgmt-section1-where-ai-appears.jpg',
        'what-ai-helps-with':
          'https://raw.githubusercontent.com/andysalvo/applied-ai-club/main/modules/images/mgmt-section2-what-ai-helps-with.jpg',
        'where-ai-falls-short':
          'https://raw.githubusercontent.com/andysalvo/applied-ai-club/main/modules/images/mgmt-section3-where-ai-falls-short.jpg',
        'what-to-keep-in-mind':
          'https://raw.githubusercontent.com/andysalvo/applied-ai-club/main/modules/images/mgmt-section4-what-to-keep-in-mind.jpg',
      }
      const CAPTIONS = {
        'where-ai-appears':
          'AI appears in management where leaders evaluate uncertain markets, coordinate operations, and make resource decisions.',
        'what-ai-helps-with':
          'AI is expected to organize information, automate routine workflows, and improve forecasting for managerial decisions.',
        'where-ai-falls-short':
          'Culture, motivation, and strategic tradeoffs remain beyond what data and models can fully capture.',
        'what-to-keep-in-mind':
          'Accountability, trust, governance, and cross-functional fluency define management readiness for AI.',
      }

      const DATA = {
        sections: [
          {
            id: 'where-ai-appears',
            title: 'Where AI Appears',
            concepts: [
              {
                id: 'strategic-planning',
                title: 'Strategic Planning and Decision Support',
                paragraphs: [
                  'In management, AI appears prominently in strategic planning where leaders must evaluate uncertain markets, limited resources, and competing priorities. Students often see this in strategy and organizational analysis courses that connect data to long-term decision quality.',
                  'Organizations use AI-supported planning tools to synthesize market signals, internal performance indicators, and scenario assumptions before major commitments are made. The value is structured comparison of options, not automatic strategy selection.',
                  'For undergraduates, this highlights a core management shift: strategy work increasingly combines qualitative framing with quantitative evidence pipelines. Managers are expected to challenge assumptions, not just receive model outputs.',
                  'For professors, this area offers rich case-based teaching where students compare classical strategic frameworks with AI-assisted decision workflows under uncertainty and time pressure.',
                ],
                keyPoints: [
                  'AI supports strategic option comparison in uncertain environments.',
                  'Planning value comes from structured evidence, not model authority alone.',
                  'Managers still own strategic tradeoff decisions.',
                ],
              },
              {
                id: 'operations-coordination',
                title: 'Operations and Process Coordination',
                paragraphs: [
                  'AI also appears in management through operations coordination, where teams track workflows, bottlenecks, and service levels across functions. This is especially visible in operations and supply chain coursework.',
                  'In practice, managers use these systems to monitor process variation, detect delays earlier, and prioritize interventions when performance drifts from expected targets. This can improve response speed across large organizations.',
                  'For undergraduates, the lesson is that operations management increasingly depends on continuous, cross-functional visibility rather than periodic status checks. Process discipline and communication remain central.',
                  'For professors, AI-enabled operations cases can strengthen teaching on process design, capacity constraints, and how organizational incentives influence whether analytical insights are actually implemented.',
                ],
                keyPoints: [
                  'AI improves operational visibility across complex workflows.',
                  'Early signal detection supports faster managerial intervention.',
                  'Execution quality still depends on process ownership and coordination.',
                ],
              },
              {
                id: 'workforce-analytics',
                title: 'Human Resource and Workforce Analytics',
                paragraphs: [
                  'In management, AI frequently appears in workforce planning, talent screening, scheduling, and performance analytics. Students encounter these themes in organizational behavior and human resource management discussions.',
                  'Organizations use data-driven systems to inform hiring pipelines, identify retention risks, and allocate staffing more efficiently. These tools can expand analytical coverage but also raise fairness and transparency concerns.',
                  'For undergraduates, this area demonstrates that people management cannot be reduced to scores. Leadership, culture, and motivation are harder to quantify yet remain decisive for organizational outcomes.',
                  'For professors, workforce analytics provides a strong framework for discussing bias, governance, and the distinction between decision support and decision delegation in employee-facing contexts.',
                ],
                keyPoints: [
                  'AI is increasingly used in workforce planning and HR analytics.',
                  'Employee-facing outputs require fairness and transparency safeguards.',
                  'Leadership judgment remains critical in people decisions.',
                ],
              },
              {
                id: 'performance-management',
                title: 'Cross-Functional Performance Management',
                paragraphs: [
                  'Management teams also use AI in performance systems that aggregate KPI data across departments. This helps leaders identify where outcomes are diverging from goals and where intervention may be needed.',
                  'These systems can support more consistent reviews by standardizing metrics and surfacing trend changes across units. At the same time, overreliance on narrow indicators can distort behavior if context is ignored.',
                  'For undergraduates, this shows that performance management is both analytical and organizational. Metrics matter, but interpretation, incentive design, and communication determine whether metrics improve outcomes.',
                  'For professors, cross-functional KPI environments are useful for teaching how measurement systems interact with accountability, collaboration, and long-term strategic alignment.',
                ],
                keyPoints: [
                  'AI can strengthen performance oversight across business units.',
                  'Metric design influences behavior and decision quality.',
                  'Context-aware interpretation is required for fair evaluation.',
                ],
              },
            ],
          },
          {
            id: 'what-ai-helps-with',
            title: 'What AI Helps With',
            concepts: [
              {
                id: 'organize-info',
                title: 'Organize Complex Organizational Information',
                paragraphs: [
                  'A central expectation in management is that AI organizes large and fragmented information flows into clearer decision inputs. Managers often need to integrate operational, financial, and workforce data from multiple systems.',
                  'AI tools are expected to improve signal detection by ranking priorities, clustering related issues, and highlighting outliers that deserve review. This reduces time lost to manual data consolidation.',
                  'For undergraduates, this illustrates how managerial work is evolving from data collection toward interpretation and prioritization. High-value management increasingly depends on asking better questions of the evidence.',
                  'For professors, this is a strong teaching context for information-quality standards, where students evaluate data lineage, comparability, and how framing choices affect downstream decisions.',
                ],
                keyPoints: [
                  'AI helps structure fragmented organizational information for decisions.',
                  'Managers gain speed in prioritization and issue triage.',
                  'Information quality checks remain essential before action.',
                ],
              },
              {
                id: 'automate-workflows',
                title: 'Automate Routine Managerial Workflows',
                paragraphs: [
                  'Management teams expect AI to automate repetitive tasks such as status reporting, dashboard updates, and workflow reminders. This can reduce administrative burden and improve consistency.',
                  'When routine monitoring is partially automated, managers can redirect attention toward coaching, problem-solving, and strategic coordination. The technology is expected to support leadership capacity rather than replace it.',
                  'For undergraduates, this reinforces that managerial productivity includes process design. Good systems separate repetitive administration from higher-order judgment and relationship work.',
                  'For professors, automation cases can highlight practical tradeoffs between efficiency gains and control needs, especially in organizations with compliance, quality, or audit expectations.',
                ],
                keyPoints: [
                  'AI can reduce repetitive managerial administration.',
                  'Freed capacity should shift toward leadership and decision quality.',
                  'Automation design must preserve oversight and control integrity.',
                ],
              },
              {
                id: 'forecasting-allocation',
                title: 'Improve Forecasting and Resource Allocation',
                paragraphs: [
                  'Another expectation is improved forecasting for budgeting, staffing, and project prioritization. Managers use AI-assisted models to compare demand assumptions and allocate resources under constraints.',
                  'These systems can broaden scenario coverage and help organizations identify where plans are most sensitive to changing conditions. Better sensitivity awareness can improve resilience.',
                  'For undergraduates, this demonstrates that planning quality depends on assumption discipline. Forecast outputs are useful only when managers understand what drives them and what could invalidate them.',
                  'For professors, this supports rigorous instruction on forecast error interpretation, scenario design, and how managerial decisions should adapt when evidence changes over time.',
                ],
                keyPoints: [
                  'AI can expand forecast and scenario coverage in planning cycles.',
                  'Resource allocation improves when assumptions are explicitly tested.',
                  'Forecasts support, but do not replace, managerial judgment.',
                ],
              },
              {
                id: 'change-management',
                title: 'Support Change Management and Execution',
                paragraphs: [
                  'Organizations also expect AI to support change execution by tracking adoption metrics, identifying implementation bottlenecks, and providing managers with early warning indicators during transitions.',
                  'In practice, this can improve coordination across teams when digital transformation or process redesign initiatives are underway. Visibility helps leaders intervene before delays become systemic.',
                  'For undergraduates, the implication is that change management is measurable but not purely technical. Data can inform adaptation, yet communication and leadership credibility remain decisive.',
                  'For professors, AI-supported change programs create an applied setting for teaching organizational design, stakeholder management, and the relationship between evidence, trust, and execution discipline.',
                ],
                keyPoints: [
                  'AI can improve visibility during organizational change initiatives.',
                  'Execution still depends on leadership, communication, and trust.',
                  'Data-informed adaptation is most useful with clear ownership.',
                ],
              },
            ],
          },
          {
            id: 'where-ai-falls-short',
            title: 'Where AI Falls Short',
            concepts: [
              {
                id: 'culture-motivation',
                title: 'Data Does Not Capture Culture and Motivation',
                paragraphs: [
                  'A common misunderstanding is assuming organizational data fully represents how people actually work. Informal norms, team trust, and motivation often influence outcomes in ways that are difficult to quantify.',
                  'AI systems can detect measurable patterns, but they cannot directly observe many social dynamics that management depends on. Ignoring this gap can produce technically tidy but operationally weak decisions.',
                  'For undergraduates, this highlights why management combines analytics with behavioral insight. Effective leaders interpret data within cultural and relational context.',
                  'For professors, this concept supports stronger integration of organizational behavior and analytics, showing students where model signals should be questioned or supplemented with qualitative evidence.',
                ],
                keyPoints: [
                  'Key organizational dynamics are not fully captured in structured datasets.',
                  'Culture and motivation remain central to management outcomes.',
                  'Analytics should be combined with behavioral and contextual judgment.',
                ],
              },
              {
                id: 'not-neutral',
                title: 'Algorithmic Outputs Are Not Neutral',
                paragraphs: [
                  'Another misconception is that AI-supported outputs are automatically objective. In management, outputs reflect historical data, feature selection choices, and policy assumptions embedded in the system design.',
                  'If historical practices contain bias or uneven treatment, models may reproduce those patterns unless actively audited and corrected. Apparent precision can hide structural issues.',
                  'For undergraduates, this is a practical lesson in critical evaluation: evidence quality includes asking who is represented, who is missing, and what incentives shaped past outcomes.',
                  'For professors, it reinforces the need to teach fairness diagnostics, governance review, and how authority can be unintentionally transferred to opaque systems.',
                ],
                keyPoints: [
                  'Algorithmic outputs are shaped by data and design choices, not neutrality.',
                  'Unchecked systems can replicate existing organizational bias.',
                  'Fairness and governance review must be part of managerial deployment.',
                ],
              },
              {
                id: 'tradeoffs',
                title: 'More Data Does Not Resolve Tradeoffs',
                paragraphs: [
                  'Management decisions involve tradeoffs among speed, cost, quality, and employee impact. More data can improve visibility but does not remove the need to choose among competing goals.',
                  'AI can surface options and projected consequences, yet value judgments remain managerial and organizational. Competing priorities cannot be optimized away automatically.',
                  'For undergraduates, this clarifies that good management requires principled decision criteria, not just high-volume analytics. Tradeoff clarity is a leadership skill.',
                  'For professors, this concept supports teaching frameworks for multi-objective decision-making where students must defend choices under real-world constraints and uncertainty.',
                ],
                keyPoints: [
                  'Data volume does not eliminate strategic and ethical tradeoffs.',
                  'AI can inform options but cannot choose organizational priorities.',
                  'Decision frameworks are required for defensible managerial choices.',
                ],
              },
              {
                id: 'org-design',
                title: 'Scale Benefits Depend on Organizational Design',
                paragraphs: [
                  'A final oversimplification is assuming AI automatically scales management quality. In reality, benefits depend on organizational design, role clarity, incentives, and implementation discipline.',
                  'Even strong tools underperform when ownership is unclear or when teams are not aligned on decision rights. Technology cannot compensate for weak governance structures.',
                  'For undergraduates, this highlights the systems view of management: tools, processes, and people must align for results to improve at scale.',
                  'For professors, this area offers a concrete way to teach why transformation success is organizational before technical, with emphasis on accountability architecture and change execution.',
                ],
                keyPoints: [
                  'AI scale gains require aligned organizational structures and incentives.',
                  'Role clarity and governance determine implementation outcomes.',
                  'Technology adoption success is primarily an organizational challenge.',
                ],
              },
            ],
          },
          {
            id: 'what-to-keep-in-mind',
            title: 'What to Keep in Mind',
            concepts: [
              {
                id: 'accountability',
                title: 'Accountability and Decision Rights',
                paragraphs: [
                  'A key management consideration is who owns decisions when AI-informed analysis is used. Organizations need explicit decision rights for model use, overrides, escalation, and final approval.',
                  'Without clear ownership, teams may over-rely on automated output or avoid responsibility when outcomes are poor. Accountability architecture is essential for consistent managerial practice.',
                  'For undergraduates, this means leadership includes defining governance boundaries, not only interpreting metrics. Decision ownership is part of professional management competence.',
                  'For professors, accountability mapping can be taught through governance cases where students assign authority, identify failure points, and design review loops.',
                ],
                keyPoints: [
                  'AI-informed decisions require explicit ownership and escalation rules.',
                  'Clear decision rights reduce ambiguity and governance failure risk.',
                  'Accountability design is central to managerial quality at scale.',
                ],
              },
              {
                id: 'trust-fairness',
                title: 'Trust, Fairness, and Employee Perception',
                paragraphs: [
                  'Management use of AI affects trust because employees interpret decisions through perceived fairness and transparency. This is especially sensitive in evaluation, promotion, and workload allocation contexts.',
                  'Even technically sound systems can fail organizationally if employees view decision processes as opaque or biased. Perceived legitimacy shapes adoption and performance.',
                  'For undergraduates, this illustrates that leadership credibility is partly procedural. How decisions are explained can matter as much as the decision itself.',
                  'For professors, this concept supports integration of ethics, organizational behavior, and analytics by examining how algorithmic processes influence morale, cooperation, and retention.',
                ],
                keyPoints: [
                  'Employee trust depends on transparent and fair decision processes.',
                  'Perceived legitimacy influences adoption of AI-supported management systems.',
                  'Communication quality is critical in employee-facing use cases.',
                ],
              },
              {
                id: 'governance-transparency',
                title: 'Governance, Transparency, and Documentation',
                paragraphs: [
                  'Management teams should treat AI deployment as a governance problem as much as a technical one. Clear documentation of assumptions, data sources, and review steps is necessary for defensible decisions.',
                  'Frameworks such as NIST AI RMF emphasize ongoing governance, measurement, and risk management rather than one-time approval. This mindset aligns well with continuous management oversight.',
                  'For undergraduates, documentation should be viewed as part of analytical rigor. Transparent process records enable review, learning, and responsible iteration.',
                  'For professors, this is a practical route to teach reproducibility and internal control design in managerial contexts where decisions affect people and performance outcomes.',
                ],
                keyPoints: [
                  'Governance requires transparent assumptions and documented review paths.',
                  'Ongoing risk management is necessary after deployment.',
                  'Documentation enables accountability, learning, and auditability.',
                ],
              },
              {
                id: 'skills-readiness',
                title: 'Skills for Students, Managers, and Faculty',
                paragraphs: [
                  'For students and faculty, the strongest preparation combines analytics, organizational behavior, ethics, and communication. Management value comes from integrating these domains under uncertainty.',
                  'Managers increasingly need to translate between technical teams and operational stakeholders while preserving clarity around goals, constraints, and accountability.',
                  'For undergraduates, this means career readiness includes critical interpretation, collaboration, and principled decision framing, not just tool proficiency.',
                  'For professors, curriculum design can emphasize mixed-method analysis and governance-aware project work so students learn to apply AI in organizationally responsible ways.',
                ],
                keyPoints: [
                  'Management-AI readiness requires both technical and organizational fluency.',
                  'Translation across teams is a core managerial capability.',
                  'Education should train responsible, context-aware decision practice.',
                ],
              },
            ],
          },
        ],
      }

      let curSec = DATA.sections[0].id,
        curCon = DATA.sections[0].concepts[0].id
      const $nav = document.getElementById('nav'),
        $reading = document.getElementById('reading')
      function sec(id) {
        return DATA.sections.find((s) => s.id === id)
      }
      function con(s, id) {
        return s.concepts.find((c) => c.id === id)
      }
      function pick(secId) {
        if (curSec === secId) return
        curSec = secId
        curCon = sec(secId).concepts[0].id
        render()
      }
      function pickCon(sId, cId) {
        curSec = sId
        curCon = cId
        render()
      }
      function renderNav() {
        let h = ''
        DATA.sections.forEach((s) => {
          const open = s.id === curSec
          h +=
            '<button type="button" class="hub-sec-btn" aria-expanded="' +
            open +
            '" onclick="pick(\'' +
            s.id +
            '\')"><svg class="hub-caret" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M6 3l5 5-5 5z"/></svg><span>' +
            s.title +
            '</span></button>'
          if (open) {
            h += '<div class="hub-concepts">'
            s.concepts.forEach((c) => {
              h +=
                '<button type="button" class="hub-con-btn" aria-pressed="' +
                (c.id === curCon) +
                '" onclick="pickCon(\'' +
                s.id +
                "','" +
                c.id +
                '\')">' +
                c.title +
                '</button>'
            })
            h += '</div>'
          }
        })
        $nav.innerHTML = h
      }
      function renderReading() {
        const s = sec(curSec),
          c = con(s, curCon),
          img = IMAGES[s.id],
          cap = CAPTIONS[s.id]
        let h =
          '<p class="hub-kicker">' +
          s.title +
          '</p><h2 class="hub-title">' +
          c.title +
          '</h2><div class="hub-bar" aria-hidden="true"></div><div class="hub-body">'
        c.paragraphs.forEach((p) => {
          h += '<p>' + p + '</p>'
        })
        h += '</div>'
        if (img) {
          h +=
            '<figure class="hub-img-wrap"><img src="' +
            img +
            '" alt="' +
            s.title +
            '" loading="lazy" onerror="this.parentElement.style.display=\'none\'"/><figcaption>' +
            cap +
            '</figcaption></figure>'
        }
        h +=
          '<div class="hub-points"><p class="hub-points-label">Key Points</p><ul class="hub-points-list">'
        c.keyPoints.forEach((pt, i) => {
          h +=
            '<li><span class="hub-num" aria-hidden="true">' +
            (i + 1) +
            '</span><span>' +
            pt +
            '</span></li>'
        })
        h += '</ul></div>'
        $reading.innerHTML = h
      }
      function render() {
        renderNav()
        renderReading()
      }
      render()
    </script>
  </body>
</html>
