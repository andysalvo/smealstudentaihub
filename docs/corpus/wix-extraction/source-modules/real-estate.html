<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI in Real Estate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --hub-navy: #01458f;
        --hub-navy-light: rgba(1, 69, 143, 0.08);
        --hub-navy-faint: rgba(1, 69, 143, 0.04);
        --hub-hover: #0c5bbf;
        --hub-bg: #f7f9fc;
        --hub-surface: #ffffff;
        --hub-border: #e3e8f0;
        --hub-text: #0b1f3b;
        --hub-text-sec: #4b5d73;
        --hub-radius: 12px;
        --hub-speed: 180ms ease;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        background: var(--hub-bg);
        color: var(--hub-text);
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif;
        font-size: 16px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }
      .hub-shell {
        max-width: 1360px;
        margin: 0 auto;
        padding: 16px;
      }
      .hub-module {
        display: grid;
        grid-template-columns: 300px 1fr;
        border: 1px solid var(--hub-border);
        border-radius: 16px;
        background: var(--hub-surface);
        box-shadow: 0 2px 16px rgba(11, 31, 59, 0.05);
        overflow: hidden;
      }
      .hub-nav {
        background: var(--hub-bg);
        border-right: 1px solid var(--hub-border);
        padding: 20px 14px;
      }
      .hub-nav-label {
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--hub-text-sec);
        padding: 0 10px 14px;
      }
      .hub-sec-btn {
        width: 100%;
        border: none;
        border-radius: 10px;
        background: transparent;
        color: var(--hub-text);
        text-align: left;
        padding: 11px 12px;
        font:
          600 13.5px/1.4 'Inter',
          sans-serif;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        transition:
          background var(--hub-speed),
          color var(--hub-speed);
      }
      .hub-sec-btn:hover {
        background: var(--hub-navy-light);
      }
      .hub-sec-btn[aria-expanded='true'] {
        background: var(--hub-navy);
        color: #fff;
      }
      .hub-sec-btn:focus-visible,
      .hub-con-btn:focus-visible {
        outline: 2px solid var(--hub-hover);
        outline-offset: 2px;
      }
      .hub-caret {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
        transition: transform var(--hub-speed);
      }
      .hub-sec-btn[aria-expanded='true'] .hub-caret {
        transform: rotate(90deg);
      }
      .hub-concepts {
        margin: 4px 0 6px 16px;
        padding-left: 12px;
        border-left: 2px solid var(--hub-border);
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .hub-con-btn {
        border: none;
        border-radius: 8px;
        background: transparent;
        color: var(--hub-text-sec);
        text-align: left;
        padding: 9px 10px;
        font:
          500 12.5px/1.45 'Inter',
          sans-serif;
        cursor: pointer;
        transition:
          background var(--hub-speed),
          color var(--hub-speed);
      }
      .hub-con-btn:hover {
        background: var(--hub-navy-faint);
        color: var(--hub-text);
      }
      .hub-con-btn[aria-pressed='true'] {
        background: var(--hub-navy-light);
        color: var(--hub-navy);
        font-weight: 600;
      }
      .hub-reading {
        padding: 28px 32px 32px;
      }
      .hub-kicker {
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--hub-navy);
        margin-bottom: 6px;
      }
      .hub-title {
        font-size: clamp(22px, 2.4vw, 32px);
        font-weight: 700;
        line-height: 1.18;
        letter-spacing: -0.015em;
        color: var(--hub-text);
      }
      .hub-bar {
        width: 40px;
        height: 3px;
        background: var(--hub-navy);
        border-radius: 2px;
        margin: 12px 0 24px;
      }
      .hub-img-wrap {
        width: 100%;
        max-width: 560px;
        border-radius: var(--hub-radius);
        overflow: hidden;
        border: 1px solid var(--hub-border);
        margin-bottom: 24px;
      }
      .hub-img-wrap img {
        width: 100%;
        aspect-ratio: 16/9;
        object-fit: cover;
        display: block;
      }
      .hub-img-wrap figcaption {
        padding: 8px 14px;
        font-size: 11.5px;
        line-height: 1.5;
        color: var(--hub-text-sec);
        background: var(--hub-bg);
        border-top: 1px solid var(--hub-border);
      }
      .hub-body {
        display: flex;
        flex-direction: column;
        gap: 14px;
        margin-bottom: 28px;
      }
      .hub-body p {
        font-size: 15px;
        line-height: 1.68;
        color: var(--hub-text-sec);
      }
      .hub-points {
        border: 1px solid var(--hub-border);
        border-radius: var(--hub-radius);
        background: var(--hub-bg);
        padding: 16px 20px;
      }
      .hub-points-label {
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--hub-text-sec);
        margin-bottom: 12px;
      }
      .hub-points-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .hub-points-list li {
        display: flex;
        align-items: baseline;
        gap: 10px;
        font-size: 13.5px;
        line-height: 1.5;
        color: var(--hub-text);
      }
      .hub-num {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--hub-navy-light);
        color: var(--hub-navy);
        font-size: 11px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .hub-sr {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
      }
      @media (max-width: 960px) {
        .hub-module {
          grid-template-columns: 260px 1fr;
        }
        .hub-reading {
          padding: 24px;
        }
      }
      @media (max-width: 768px) {
        .hub-shell {
          padding: 10px;
        }
        .hub-module {
          grid-template-columns: 1fr;
        }
        .hub-nav {
          border-right: none;
          border-bottom: 1px solid var(--hub-border);
          padding: 16px 12px;
        }
        .hub-reading {
          padding: 20px 16px 24px;
        }
        .hub-title {
          font-size: 22px;
        }
        .hub-img-wrap {
          max-width: 100%;
        }
      }
      @media (max-width: 480px) {
        .hub-shell {
          padding: 6px;
        }
        .hub-module {
          border-radius: 10px;
        }
        .hub-reading {
          padding: 16px 14px 20px;
        }
        .hub-body p {
          font-size: 14px;
        }
        .hub-points-list li {
          font-size: 13px;
        }
      }
    </style>
  </head>
  <body>
    <main class="hub-shell">
      <h1 class="hub-sr">AI in Real Estate</h1>
      <div class="hub-module">
        <nav class="hub-nav" aria-label="Sections">
          <p class="hub-nav-label">AI in Real Estate</p>
          <div id="nav"></div>
        </nav>
        <article class="hub-reading" aria-live="polite" id="reading"></article>
      </div>
    </main>

    <script>
      const IMAGES = {
        'where-ai-appears':
          'https://raw.githubusercontent.com/andysalvo/applied-ai-club/main/modules/images/re-section1-where-ai-appears.jpg',
        'what-ai-helps-with':
          'https://raw.githubusercontent.com/andysalvo/applied-ai-club/main/modules/images/re-section2-what-ai-helps-with.jpg',
        'where-ai-falls-short':
          'https://raw.githubusercontent.com/andysalvo/applied-ai-club/main/modules/images/re-section3-where-ai-falls-short.jpg',
        'what-to-keep-in-mind':
          'https://raw.githubusercontent.com/andysalvo/applied-ai-club/main/modules/images/re-section4-what-to-keep-in-mind.jpg',
      }

      const CAPTIONS = {
        'where-ai-appears':
          'AI appears in real estate where property decisions depend on analyzing large volumes of market and financial data.',
        'what-ai-helps-with':
          'AI is expected to improve speed and consistency in valuation, screening, and transaction workflows.',
        'where-ai-falls-short':
          'Real estate is deeply local, and models trained in one market may not transfer reliably to another.',
        'what-to-keep-in-mind':
          'Governance, explainability, and fairness shape how AI is evaluated in real estate practice.',
      }

      const DATA = {
        sections: [
          {
            id: 'where-ai-appears',
            title: 'Where AI Appears',
            concepts: [
              {
                id: 'valuation',
                title: 'Property Valuation and Appraisal Analytics',
                paragraphs: [
                  'In real estate, AI appears most clearly in valuation and appraisal workflows where professionals estimate property value under uncertainty. Students encounter this in real estate finance, appraisal, and market analysis courses where pricing decisions depend on comparables, location context, and property features.',
                  'Organizations use AI-supported valuation tools to process large sets of transactions, rental history, neighborhood indicators, and property characteristics. These systems can improve speed and consistency when screening large asset pools.',
                  'For undergraduates, this topic shows that valuation is becoming both analytical and interpretive. Automated estimates provide structure, but local context and property condition still require professional judgment.',
                  'For professors, appraisal analytics creates a strong teaching bridge between classic valuation methods and data-driven modeling, especially when students compare model outputs with case-based market realities.',
                ],
                keyPoints: [
                  'AI is widely used to support faster valuation and appraisal screening.',
                  'Model estimates still require local market interpretation.',
                  'Students should treat automated valuation as decision support, not final truth.',
                ],
              },
              {
                id: 'market-analysis',
                title: 'Market Analysis and Demand Forecasting',
                paragraphs: [
                  'AI also appears in real estate through market analytics, where firms monitor price trends, demand shifts, and inventory conditions across neighborhoods and regions. This is common in investment analysis and urban market research contexts.',
                  'Teams use AI-enabled forecasting tools to test assumptions about absorption, rental demand, interest-rate sensitivity, and population movement. The goal is better timing and allocation decisions under changing market conditions.',
                  'For undergraduates, this highlights that market forecasting depends on assumptions, data windows, and scenario design rather than one permanent model view of the market.',
                  'For professors, forecasting cases support instruction on uncertainty, model drift, and how macroeconomic signals interact with local market behavior in real estate decision frameworks.',
                ],
                keyPoints: [
                  'AI helps identify market trends and demand signals at broader scale.',
                  'Forecast reliability depends on assumptions and ongoing recalibration.',
                  'Real estate market decisions should combine quantitative and local evidence.',
                ],
              },
              {
                id: 'brokerage-crm',
                title: 'Brokerage CRM and Client Targeting',
                paragraphs: [
                  'In brokerage and leasing operations, AI appears in CRM systems that prioritize leads, personalize outreach, and support client engagement planning across multiple channels.',
                  'Firms use these tools to score lead quality, recommend follow-up timing, and align messaging with client preferences, which can improve workflow efficiency for agents and teams.',
                  'For undergraduates, this topic demonstrates how real estate practice combines relationship management with data-supported process design. Efficient outreach still depends on credibility and trust.',
                  'For professors, brokerage analytics offers a practical context for examining conversion metrics, customer journey design, and ethical boundaries around targeting behavior in housing and commercial markets.',
                ],
                keyPoints: [
                  'AI-powered CRM supports lead prioritization and client workflow management.',
                  'Engagement quality depends on trust, timing, and communication design.',
                  'Targeting tools should be used with fairness and compliance awareness.',
                ],
              },
              {
                id: 'portfolio-ops',
                title: 'Portfolio Operations and Asset Management',
                paragraphs: [
                  'AI appears in portfolio and property operations where managers oversee maintenance, occupancy, risk, and performance across many assets. This is increasingly important in institutional and multi-property contexts.',
                  'Operational systems use AI to detect anomalies in costs, forecast vacancy risk, and prioritize maintenance actions based on expected impact and budget constraints.',
                  'For undergraduates, this shows how asset management decisions depend on integrating financial, operational, and tenant-related information rather than reviewing each property in isolation.',
                  'For professors, portfolio operations provide strong case material for teaching systems-level management, KPI governance, and how technology affects asset-level and fund-level decision quality.',
                ],
                keyPoints: [
                  'AI supports portfolio oversight by improving operational signal detection.',
                  'Asset decisions require integration of financial and operational context.',
                  'Technology value is strongest when tied to clear management workflows.',
                ],
              },
            ],
          },
          {
            id: 'what-ai-helps-with',
            title: 'What AI Helps With',
            concepts: [
              {
                id: 'data-processing',
                title: 'Automate Listing and Market Data Processing',
                paragraphs: [
                  'A key expectation in real estate is that AI automates the processing of listings, transactions, and market datasets that are too large for manual review alone.',
                  'Teams expect these systems to reduce repetitive data preparation work, standardize records, and improve the speed of market updates used in decision dashboards.',
                  'For undergraduates, this reframes professional value: analysts are expected to spend less time on manual compilation and more time on interpretation and strategic communication.',
                  'For professors, automation-focused projects can teach data governance, reproducibility, and quality assurance methods needed for reliable real estate analytics.',
                ],
                keyPoints: [
                  'AI is expected to improve speed and consistency in listing data workflows.',
                  'Automation should reduce manual effort while preserving data integrity.',
                  'Students should build skills in interpretation and validation, not just extraction.',
                ],
              },
              {
                id: 'pricing-underwriting',
                title: 'Improve Pricing, Underwriting, and Investment Screening',
                paragraphs: [
                  'Another expectation is stronger investment screening through faster pricing analysis, risk flagging, and underwriting support. This is especially relevant in acquisition and lending decisions.',
                  'AI-enabled tools can compare opportunity sets, highlight outliers, and test how returns change under different assumptions about rates, costs, and demand.',
                  'For undergraduates, this topic emphasizes that underwriting quality depends on structured assumptions and transparent model logic, not just automated output speed.',
                  'For professors, this area supports deeper instruction on risk-adjusted return analysis, scenario sensitivity, and defensible investment decision documentation.',
                ],
                keyPoints: [
                  'AI can speed investment screening and underwriting analysis.',
                  'Pricing decisions remain sensitive to assumptions and model design.',
                  'Decision documentation is essential in high-stakes investment contexts.',
                ],
              },
              {
                id: 'risk-scenario',
                title: 'Support Risk and Scenario Analysis',
                paragraphs: [
                  'Real estate teams also expect AI to improve risk analysis by modeling different market paths and stress conditions across assets and geographies.',
                  'These tools help evaluate downside exposure related to vacancy, interest rates, tenant turnover, and macroeconomic shocks before major commitments are made.',
                  'For undergraduates, this highlights that scenario analysis is a discipline of structured uncertainty management rather than simple prediction.',
                  'For professors, risk modeling provides an excellent framework for teaching sensitivity analysis, assumption transparency, and the limits of extrapolating from historical data.',
                ],
                keyPoints: [
                  'AI can broaden scenario coverage in risk evaluation workflows.',
                  'Stress testing helps reveal where strategies are most vulnerable.',
                  'Risk conclusions should be communicated with clear uncertainty boundaries.',
                ],
              },
              {
                id: 'client-experience',
                title: 'Enhance Client Experience and Transaction Coordination',
                paragraphs: [
                  'A further expectation is that AI improves transaction workflows by supporting communication timing, document management, and service responsiveness across complex deal processes.',
                  'Organizations use AI-assisted coordination tools to reduce delays, track process steps, and improve the consistency of client-facing interactions.',
                  'For undergraduates, this demonstrates that real estate technology is not only about valuation but also about operational reliability and relationship quality.',
                  'For professors, transaction coordination cases help students examine how process automation interacts with legal, ethical, and customer trust considerations.',
                ],
                keyPoints: [
                  'AI can improve consistency and speed in transaction process management.',
                  'Client experience depends on both system efficiency and human communication.',
                  'Workflow automation should support trust, clarity, and accountability.',
                ],
              },
            ],
          },
          {
            id: 'where-ai-falls-short',
            title: 'Where AI Falls Short',
            concepts: [
              {
                id: 'local-context',
                title: 'Model Quality Depends on Local Data Context',
                paragraphs: [
                  'A common misunderstanding is assuming a model that performs in one city will perform equally well everywhere. Real estate is highly local, and market structure differences can quickly reduce model reliability.',
                  'Data gaps, reporting standards, zoning variation, and neighborhood-specific factors can distort predictions when local context is weak or outdated.',
                  'For undergraduates, this is a reminder that geographic context is central to analytical validity in real estate.',
                  'For professors, this concept supports teaching on model transfer limits, external validity, and how to design localization checks before deployment.',
                ],
                keyPoints: [
                  'Real estate models are strongly constrained by local market data quality.',
                  'Cross-market portability should be tested, not assumed.',
                  'Context-aware validation improves reliability and reduces decision risk.',
                ],
              },
              {
                id: 'due-diligence',
                title: 'AI Cannot Replace On-Site Due Diligence',
                paragraphs: [
                  'Another misconception is that AI can replace in-person due diligence, inspection judgment, and legal review in transactions.',
                  'Automated systems can prioritize where to focus, but they cannot fully capture physical condition, tenant dynamics, or contractual complexities that shape real outcomes.',
                  'For undergraduates, this clarifies that field knowledge and professional judgment remain essential even in highly data-driven workflows.',
                  'For professors, due-diligence case work can reinforce how quantitative screening and qualitative assessment should be integrated in professional decision practice.',
                ],
                keyPoints: [
                  'AI supports due diligence prioritization but does not replace it.',
                  'Physical, legal, and operational realities require human assessment.',
                  'Integrated qualitative and quantitative review improves deal quality.',
                ],
              },
              {
                id: 'bias-compliance',
                title: 'Automated Systems Can Reinforce Bias and Compliance Risk',
                paragraphs: [
                  'AI outputs in real estate are sometimes treated as neutral despite potential bias in historical data and workflow design. Without safeguards, models can reproduce unfair patterns.',
                  'In housing and lending contexts, this creates serious ethical and regulatory risk, especially when targeting, pricing, or screening rules are not transparent.',
                  'For undergraduates, this highlights the importance of fairness awareness and responsible analytics design in professional real estate practice.',
                  'For professors, bias and compliance topics provide a concrete way to integrate legal frameworks, governance standards, and technical evaluation into coursework.',
                ],
                keyPoints: [
                  'Historical bias can propagate through automated real estate systems.',
                  'Compliance and fairness review are mandatory in sensitive use cases.',
                  'Transparency and oversight reduce ethical and regulatory exposure.',
                ],
              },
              {
                id: 'scaling-governance',
                title: 'Scaling Requires Governance, Not Just Software',
                paragraphs: [
                  'There is often an assumption that deploying AI tools automatically scales performance. In practice, outcomes depend on governance design, role clarity, and process adoption across teams.',
                  'Without clear ownership and review protocols, even strong tools can create inconsistent decisions and operational confusion.',
                  'For undergraduates, this demonstrates that scaling technology is an organizational challenge as much as a technical one.',
                  'For professors, this theme supports teaching on change management, cross-functional coordination, and capability maturity in real estate organizations.',
                ],
                keyPoints: [
                  'Software alone does not guarantee enterprise-scale performance gains.',
                  'Governance and ownership structures determine implementation quality.',
                  'Sustainable adoption requires coordinated organizational design.',
                ],
              },
            ],
          },
          {
            id: 'what-to-keep-in-mind',
            title: 'What to Keep in Mind',
            concepts: [
              {
                id: 'governance-privacy',
                title: 'Data Governance, Privacy, and Regulatory Alignment',
                paragraphs: [
                  'Real estate AI decisions often involve sensitive personal and financial information, so governance and privacy controls are central professional responsibilities.',
                  'Teams must align data practices with legal and policy requirements while maintaining clear standards for collection, access, retention, and use.',
                  'For undergraduates, this means understanding that governance is part of technical competence, not separate from analytics work.',
                  'For professors, governance-centered instruction helps students connect data stewardship, legal compliance, and trustworthy decision-support design.',
                ],
                keyPoints: [
                  'Privacy and governance controls are foundational in real estate analytics.',
                  'Regulatory alignment must be built into workflow design.',
                  'Trustworthy systems require disciplined stewardship practices.',
                ],
              },
              {
                id: 'explainability',
                title: 'Explainability and Decision Documentation',
                paragraphs: [
                  'High-stakes real estate decisions require explainable models and clear records of how conclusions were formed. Stakeholders need to understand assumptions and limits.',
                  'Documentation improves auditability, internal review quality, and communication with investors, lenders, clients, and compliance teams.',
                  'For undergraduates, this emphasizes that communication quality is a core analytical skill in real estate technology roles.',
                  "For professors, explainability-focused assignments can strengthen students' ability to defend decisions and critique model transparency.",
                ],
                keyPoints: [
                  'Explainable outputs are essential for trust in high-impact decisions.',
                  'Documentation supports accountability and review readiness.',
                  'Analytical communication is a core real estate capability.',
                ],
              },
              {
                id: 'accountability',
                title: 'Human Oversight and Accountability Design',
                paragraphs: [
                  'AI in real estate should operate inside clear decision-rights structures where ownership, escalation, and override rules are explicit.',
                  'When accountability is unclear, teams may over-rely on model outputs or under-own risk when outcomes diverge from expectations.',
                  'For undergraduates, this topic highlights that leadership includes defining review pathways, not only interpreting model metrics.',
                  'For professors, accountability mapping offers practical frameworks for teaching governance architecture in transaction, investment, and operations contexts.',
                ],
                keyPoints: [
                  'Decision rights and oversight pathways must be explicitly defined.',
                  'Clear accountability reduces operational and reputational risk.',
                  'Human governance remains central in AI-enabled real estate workflows.',
                ],
              },
              {
                id: 'skills-readiness',
                title: 'Skills for Students, Faculty, and Real Estate Teams',
                paragraphs: [
                  'Effective preparation for AI-enabled real estate combines market analysis, finance, data literacy, regulation awareness, and communication capability.',
                  'Professionals increasingly need to translate technical outputs into investment, operations, and client decisions that are understandable and defensible.',
                  'For undergraduates, this means building cross-domain fluency: interpret uncertainty, ask better questions, and communicate implications clearly.',
                  'For professors, interdisciplinary project design can help students practice realistic workflows that combine analytics, governance, and strategic decision framing.',
                ],
                keyPoints: [
                  'Real estate AI readiness requires technical and domain integration skills.',
                  'Translation between models and decisions is a core professional capability.',
                  'Interdisciplinary training improves real-world decision quality.',
                ],
              },
            ],
          },
        ],
      }

      let curSec = DATA.sections[0].id,
        curCon = DATA.sections[0].concepts[0].id
      const $nav = document.getElementById('nav'),
        $reading = document.getElementById('reading')
      function sec(id) {
        return DATA.sections.find((s) => s.id === id)
      }
      function con(s, id) {
        return s.concepts.find((c) => c.id === id)
      }
      function pick(secId) {
        if (curSec === secId) return
        curSec = secId
        curCon = sec(secId).concepts[0].id
        render()
      }
      function pickCon(sId, cId) {
        curSec = sId
        curCon = cId
        render()
      }
      function renderNav() {
        let h = ''
        DATA.sections.forEach((s) => {
          const open = s.id === curSec
          h +=
            '<button type="button" class="hub-sec-btn" aria-expanded="' +
            open +
            '" onclick="pick(\'' +
            s.id +
            '\')"><svg class="hub-caret" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M6 3l5 5-5 5z"/></svg><span>' +
            s.title +
            '</span></button>'
          if (open) {
            h += '<div class="hub-concepts">'
            s.concepts.forEach((c) => {
              h +=
                '<button type="button" class="hub-con-btn" aria-pressed="' +
                (c.id === curCon) +
                '" onclick="pickCon(\'' +
                s.id +
                "','" +
                c.id +
                '\')">' +
                c.title +
                '</button>'
            })
            h += '</div>'
          }
        })
        $nav.innerHTML = h
      }
      function renderReading() {
        const s = sec(curSec),
          c = con(s, curCon),
          img = IMAGES[s.id],
          cap = CAPTIONS[s.id]
        let h =
          '<p class="hub-kicker">' +
          s.title +
          '</p><h2 class="hub-title">' +
          c.title +
          '</h2><div class="hub-bar" aria-hidden="true"></div><div class="hub-body">'
        c.paragraphs.forEach((p) => {
          h += '<p>' + p + '</p>'
        })
        h += '</div>'
        if (img) {
          h +=
            '<figure class="hub-img-wrap"><img src="' +
            img +
            '" alt="' +
            s.title +
            '" loading="lazy" onerror="this.parentElement.style.display=\'none\'"/><figcaption>' +
            cap +
            '</figcaption></figure>'
        }
        h +=
          '<div class="hub-points"><p class="hub-points-label">Key Points</p><ul class="hub-points-list">'
        c.keyPoints.forEach((pt, i) => {
          h +=
            '<li><span class="hub-num" aria-hidden="true">' +
            (i + 1) +
            '</span><span>' +
            pt +
            '</span></li>'
        })
        h += '</ul></div>'
        $reading.innerHTML = h
      }
      function render() {
        renderNav()
        renderReading()
      }
      render()
    </script>
  </body>
</html>
